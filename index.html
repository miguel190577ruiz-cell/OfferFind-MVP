<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OfferFind MVP</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
    }

    #splash {
      position: fixed;
      inset: 0;
      background: black;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 42px;
      font-weight: bold;
      z-index: 10;
    }

    #app {
      display: none;
      height: 100vh;
      overflow-y: scroll;
      background: black;
    }

    .offer {
      height: 100vh;
      padding: 40px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      box-sizing: border-box;
    }

    .offer h2 {
      font-size: 34px;
      margin-bottom: 20px;
    }

    .offer p {
      font-size: 24px;
      margin-bottom: 25px;
    }

    .btn {
      background: #00c8ff;
      padding: 16px 25px;
      border-radius: 30px;
      text-decoration: none;
      color: black;
      font-weight: bold;
      font-size: 22px;
      display: block;
      text-align: center;
    }

    .comerciante-btn {
      margin-top: 25px;
      background: none;
      border: 1px solid rgba(255,255,255,0.4);
      color: white;
      padding: 12px 20px;
      border-radius: 25px;
      font-size: 16px;
      opacity: 0.9;
    }

    #comercio {
      display: none;
      min-height: 100vh;
      padding: 30px;
      box-sizing: border-box;
      background: black;
      color: white;
    }

    #comercio h2 {
      font-size: 32px;
      margin-bottom: 20px;
    }

    .admin-btn, .volver-btn {
      display: block;
      width: 100%;
      margin-top: 15px;
      padding: 16px;
      border-radius: 25px;
      border: none;
      font-size: 18px;
      font-weight: bold;
    }

    .admin-btn {
      background: #00c8ff;
      color: black;
    }

    .volver-btn {
      background: #222;
      color: white;
    }
  </style>
</head>

<body>

  <div id="splash">
    OfferFind
  </div>

  <div id="app">
    <div class="offer">
      <h2 id="tituloOferta">Bar La Plaza</h2>
<p id="textoOferta">Caña + tapa</p>

      <a class="btn" href="https://www.google.com/maps" target="_blank">Ir</a>

      <button class="comerciante-btn" onclick="irComercio()">
        Soy comerciante
      </button>
    </div>
  </div>

  <div id="comercio">
  <h2>Zona Comercio</h2>
  <p>Introduce tu PIN para gestionar tu oferta.</p>

  <input id="pinComercio" placeholder="PIN del comercio"
    style="width:100%; padding:14px; margin:20px 0 10px; border-radius:12px; border:none; font-size:18px;">

  <button class="admin-btn" onclick="entrarComercio()">
    Entrar como comercio
  </button>

  <button class="admin-btn" onclick="entrarAdmin()">
    Acceso administrador
  </button>

  <button class="volver-btn" onclick="volverFeed()">
    Volver al feed
  </button>
  </div>

  <script>
    setTimeout(() => {
      document.getElementById("splash").style.display = "none";
      document.getElementById("app").style.display = "block";
    }, 1000);
// Cargar oferta guardada
const nombreGuardado = localStorage.getItem("nombreLocal");
const descripcionGuardada = localStorage.getItem("descripcionOferta");

if (nombreGuardado && descripcionGuardada) {
  document.getElementById("tituloOferta").innerText = nombreGuardado;
  document.getElementById("textoOferta").innerText = descripcionGuardada;
}
    function irComercio() {
      document.getElementById("app").style.display = "none";
      document.getElementById("comercio").style.display = "block";
    }

    function volverFeed() {
      document.getElementById("comercio").style.display = "none";
      document.getElementById("app").style.display = "block";
    }
function entrarComercio() {
  const pin = document.getElementById("pinComercio").value;

  if (!pin) {
    alert("Introduce tu PIN");
    return;
  }

  alert("Acceso comercio concedido. PIN: " + pin);
}
    function entrarAdmin() {
      const pin = prompt("Introduce PIN administrador");

      if (pin === "1234") {
        alert("Acceso concedido");
      } else {
        alert("PIN incorrecto");
      }
    }
    function publicarOferta() {
  const nombre = document.getElementById("nombreLocal").value;
  const descripcion = document.getElementById("descripcionOferta").value;

  if (!nombre || !descripcion) {
    alert("Rellena todos los campos");
    return;
  }

  // GUARDAR
  localStorage.setItem("nombreLocal", nombre);
  localStorage.setItem("descripcionOferta", descripcion);

  
  document.getElementById("tituloOferta").innerText = nombre;
  document.getElementById("textoOferta").innerText = descripcion;

  alert("Oferta publicada");

  volverFeed();
    }
  </script>

</body>
</html>
