<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OfferFind MVP</title>

<style>
body {
  margin: 0;
  background: black;
  font-family: Arial;
}

#splash {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 42px;
  color: white;
  z-index: 10;
}

#app {
  display: none;
  height: 100vh;
  overflow-y: scroll;
  scroll-snap-type: y mandatory;
}

.offer {
  height: 100vh;
  position: relative;
  scroll-snap-align: start;
}

.btn-fixed {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  background: rgba(0,0,0,0.6);
  color: white;
  border: none;
  padding: 10px;
  border-radius: 20px;
}

.btn-comerciante {
  right: 90px;
}

</style>
</head>

<body>

<div id="splash">OfferFind</div>

<div id="app"></div>

<button class="btn-fixed btn-comerciante" onclick="irComercio()">Soy comerciante</button>

<div id="comercio" style="display:none; padding:20px; color:white;">
  <h2>Zona Comercio</h2>
  <input id="pinComercio" placeholder="PIN">
  <button onclick="entrarComercio()">Entrar</button>
  <button onclick="volverFeed()">Volver</button>
</div>

<div id="panelComercio" style="display:none; padding:20px; color:white;">
  <input id="nombreLocal" placeholder="Nombre">
  <input id="direccionLocal" placeholder="Dirección">
  <input id="descripcionOferta" placeholder="Oferta">
  <input type="file" id="videoInput">
  <button onclick="publicarOferta()">Publicar</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabase = window.supabase.createClient(
  "https://mmfuhvlxjzvfotonjycw.supabase.co",
  "TU_PUBLIC_KEY_AQUI"
);

setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("app").style.display = "block";
}, 1000);

// 🔥 CARGAR FEED
async function cargarOfertas() {

  const { data, error } = await supabase
    .from('offers')
    .select('*')
    .order('created_at', { ascending: false });

  if (error) {
    console.error(error);
    return;
  }

  const contenedor = document.getElementById("app");
  contenedor.innerHTML = "";

  data.forEach(oferta => {

    const div = document.createElement("div");
    div.className = "offer";

    div.innerHTML = `
      <video src="${oferta['media-url']}" autoplay muted loop playsinline
        style="width:100%; height:100%; object-fit:cover;"></video>

      <div style="position:absolute; bottom:120px; left:20px; color:white;">
        <h2>${oferta.title}</h2>
        <p>${oferta.description} ${oferta.price}</p>
      </div>

      <a href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(oferta.title)}"
        target="_blank"
        style="
          position:absolute;
          bottom:40px;
          left:20px;
          right:20px;
          background:#B4FF00;
          text-align:center;
          padding:15px;
          border-radius:30px;
          color:black;
          font-weight:bold;
        ">
        IR | GO
      </a>
    `;

    contenedor.appendChild(div);
  });
}

// 🔥 PUBLICAR OFERTA
async function publicarOferta() {

  const nombre = document.getElementById("nombreLocal").value;
  const direccion = document.getElementById("direccionLocal").value;
  const descripcion = document.getElementById("descripcionOferta").value;
  const archivo = document.getElementById("videoInput").files[0];

  let archivoUrl = "";

  if (archivo) {
    const nombreArchivo = Date.now() + "-" + archivo.name;

    const res = await fetch(
      "https://shy-wave-7641.miguel190577ruiz.workers.dev/" + encodeURIComponent(nombreArchivo),
      {
        method: "PUT",
        body: archivo
      }
    );

    const data = await res.json();
    archivoUrl = data.fileName;
  }

  await supabase.from("offers").insert([{
    title: nombre,
    description: descripcion,
    price: "",
    "media-url": "https://shy-wave-7641.miguel190577ruiz.workers.dev/" + archivoUrl
  }]);

  alert("Oferta publicada");

  cargarOfertas();
  volverFeed();
}

// UI
function irComercio() {
  document.getElementById("app").style.display = "none";
  document.getElementById("comercio").style.display = "block";
}

function entrarComercio() {
  document.getElementById("comercio").style.display = "none";
  document.getElementById("panelComercio").style.display = "block";
}

function volverFeed() {
  document.getElementById("comercio").style.display = "none";
  document.getElementById("panelComercio").style.display = "none";
  document.getElementById("app").style.display = "block";
}

// INIT
cargarOfertas();

</script>

</body>
</html>
