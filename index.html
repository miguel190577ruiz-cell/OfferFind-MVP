async function cargarOfertas() {
  const app = document.getElementById("app");

  const { data, error } = await db
    .from("offers")
    .select("*")
    .order("created_at", { ascending:false });

  if (error) {
    console.error(error);
    app.innerHTML = "<h1>OfferFind</h1><p>Error cargando ofertas</p>";
    return;
  }

  if (!data || data.length === 0) {
    app.innerHTML = "<h1>OfferFind</h1><p>Todavía no hay ofertas publicadas</p>";
    return;
  }

  app.innerHTML = "";

  data.forEach(oferta => {
    if (oferta.type === "express" && oferta.expires_at) {
  const caducada = new Date(oferta.expires_at) <= new Date();
  if (caducada) return;
    }
    const media = oferta["media-url"];

if (!media) return;
    const esVideo = media.toLowerCase().includes(".mp4") || media.toLowerCase().includes(".mov") || media.toLowerCase().includes(".webm");

    const mapsUrl = "https://www.google.com/maps/search/?api=1&query=" + encodeURIComponent(oferta.address || oferta.title);

    const div = document.createElement("div");
    div.className = "offer-card";
    div.style = "margin-bottom:40px;";

    div.innerHTML = `
      ${esVideo
        ? `<video src="${media}" autoplay muted loop playsinline controls></video>`
        : `<img src="${media}">`
      }

      <h2>${oferta.title || ""}</h2>

${oferta.type === "express" && oferta.expires_at
  ? `<p class="offer-text" id="timer-${oferta.id}">⚡ EXPRESS</p>`
  : ""
}
<p class="offer-text">${oferta.description || ""}</p>

      <a class="go-btn" href="${mapsUrl}" target="_blank">
        IR | GO →
      </a>
    `;
if (oferta.type === "express" && oferta.expires_at) {
  const el = div.querySelector(`#timer-${oferta.id}`);

  function actualizarTimer() {
    const diff = new Date(oferta.expires_at) - new Date();

    if (diff <= 0) {
      el.innerText = "⛔ Expirada";
      return;
    }

    const mins = Math.floor(diff / 60000);

    const minutos = mins % 60;

    el.innerText = `⚡ EXPRESS · ${horas > 0 ? horas + "h " : ""}${minutos}min`;
  }

  setInterval(actualizarTimer, 60000);
}

cargarOfertas();
 let slideActual = 0;
let touchInicioY = 0;
let scrollBloqueado = false;

function irASlide(index) {
  const cards = document.querySelectorAll(".offer-card");
  if (!cards.length) return;

  slideActual = Math.max(0, Math.min(index, cards.length - 1));

  window.scrollTo({
    top: cards[slideActual].offsetTop,
    behavior: "smooth"
  });

  setTimeout(() => {
    controlarVideosVisibles();
  }, 450);
}

window.addEventListener("touchstart", (e) => {
  touchInicioY = e.touches[0].clientY;
}, { passive: false });

window.addEventListener("touchmove", (e) => {
  e.preventDefault();
}, { passive: false });

window.addEventListener("touchend", (e) => {
  if (scrollBloqueado) return;

  const touchFinY = e.changedTouches[0].clientY;
  const diferencia = touchInicioY - touchFinY;

  if (Math.abs(diferencia) < 40) return;

  scrollBloqueado = true;

  if (diferencia > 0) {
    irASlide(slideActual + 1);
  } else {
    irASlide(slideActual - 1);
  }

  setTimeout(() => {
    scrollBloqueado = false;
  }, 600);
}, { passive: false });
  function controlarVideosVisibles() {
  document.querySelectorAll("video").forEach(video => {
    const rect = video.getBoundingClientRect();

    // solo el que está en el centro de pantalla
    const visible = rect.top < window.innerHeight * 0.6 && rect.bottom > window.innerHeight * 0.4;

    if (visible) {
      video.muted = !sonidoActivo;
      video.play().catch(() => {});
    } else {
      video.pause();
      video.currentTime = 0; // 👈 clave: reinicia
      video.muted = true;
    }
  });
  }
  window.addEventListener("scroll", controlarVideosVisibles);

window.addEventListener("touchend", () => {
  setTimeout(controlarVideosVisibles, 300);
});
